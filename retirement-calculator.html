<!DOCTYPE html>
<html>
<body>
<h1>Retirement Savings Calculator</h1>

<input id="current" placeholder="Current savings">
<input id="monthly" placeholder="Monthly contribution">
<input id="years" placeholder="Years">

<button onclick="calc()">Calculate</button>

<h2 id="r"></h2>

<script>
function calc(){
let total = Number(current.value) + (monthly.value * 12 * years.value);
r.innerHTML = "Total: $" + total.toFixed(2);
}
</script>
</body>
</html>
