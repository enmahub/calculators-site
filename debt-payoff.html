<!DOCTYPE html>
<html>
<head>
<title>Debt Payoff Calculator (Free) – Calculate Repayment Time Instantly</title>
<meta name="description" content="Calculate how long it will take to pay off your debt and total interest with this free calculator.">
<meta name="robots" content="index, follow">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<h1>Debt Payoff Calculator</h1>

<input id="d" placeholder="Debt">
<input id="p" placeholder="Monthly payment">

<button onclick="calc()">Calculate</button>
<h2 id="r"></h2>

<script>
function calc(){
let months=d.value/p.value;
r.innerHTML="Months: "+months.toFixed(0);
}
</script>
