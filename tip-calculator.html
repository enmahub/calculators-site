<!DOCTYPE html>
<html>
<body>
<h1>Tip Calculator</h1>

<input id="bill" placeholder="Bill">
<input id="tip" placeholder="Tip %">

<button onclick="calc()">Calculate</button>
<h2 id="r"></h2>

<script>
function calc(){
let t=bill.value*(tip.value/100);
r.innerHTML="Tip: $"+t;
}
</script>
</body>
</html>
